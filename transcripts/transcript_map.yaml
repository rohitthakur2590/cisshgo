---
platforms:
  csr1000v:
    vendor: "cisco"
    hostname: "cisshgo1000v"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show ip interface brief": "cisco/csr1000v/show_ip_interface_brief.txt"
      "show running-config": "cisco/csr1000v/show_running-config.txt"
      "show version": "cisco/csr1000v/show_version.txt"
      "terminal length 0": "generic_empty_return.txt"
      "terminal width 511": "generic_empty_return.txt"
      "write mem": "cisco/csr1000v/write_mem.txt"
    context_hierarchy:
      "(config-if)#": "(config)#"
      "(config)#": "#"
      "#": ">"
      ">": "exit"
    context_search:
      "interface": "(config-if)#"
      "configure terminal": "(config)#"
      "enable": "#"
      "base": ">"
    end_context: "#"
  iosxr:
    vendor: "cisco"
    hostname: "cisshgo-xr"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show version": "cisco/iosxr/show_version.txt"
      "terminal length 0": "generic_empty_return.txt"
    context_hierarchy:
      "#": "exit"
      "(config)#": "#"
    context_search:
      "configure terminal": "(config)#"
      "base": "#"
    end_context: "#"
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      # Connection setup (sent by network_cli + terminal plugin)
      "show privilege": "cisco/ios/show_privilege.txt"
      "terminal length 0": "generic_empty_return.txt"
      "terminal width 512": "generic_empty_return.txt"
      "terminal width 0": "generic_empty_return.txt"
      # Device info (sent by cliconf get_device_info)
      "show version": "cisco/ios/show_version.txt"
      # General show commands
      "show running-config": "cisco/ios/show_running-config.txt"
      "show running-config | section ^interface": "cisco/ios/show_running-config_section_interface_gathered.txt"
      "show ip interface brief": "cisco/ios/show_ip_interface_brief.txt"
      "show interfaces": "cisco/ios/show_interfaces.txt"
      "show interface loopback 888": "cisco/ios/show_interface_loopback_888.txt"
      # Config mode (no-op responses)
      "write mem": "generic_empty_return.txt"
      "write memory": "generic_empty_return.txt"
    context_hierarchy:
      "(config-if)#": "(config)#"
      "(config)#": "#"
      "#": ">"
      ">": "exit"
    context_search:
      "interface": "(config-if)#"
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"
    end_context: "#"
  asa:
    vendor: "cisco"
    hostname: "cisshgo-asa"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show version": "cisco/asa/show_version.txt"
      "show interface ip brief": "cisco/asa/show_interface_ip_brief.txt"
      "show running-config": "cisco/asa/show_running-config.txt"
      "terminal pager 0": "generic_empty_return.txt"
    context_hierarchy:
      "(config-if)#": "(config)#"
      "(config)#": "#"
      "#": ">"
      ">": "exit"
    context_search:
      "interface": "(config-if)#"
      "configure terminal": "(config)#"
      "enable": "#"
      "base": ">"
    end_context: "#"
  nxos:
    vendor: "cisco"
    hostname: "cisshgo-nxos"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show version": "cisco/nxos/show_version.txt"
      "show ip interface brief": "cisco/nxos/show_ip_interface_brief.txt"
      "show running-config": "cisco/nxos/show_running-config.txt"
      "terminal length 0": "generic_empty_return.txt"
    context_hierarchy:
      "(config-if)#": "(config)#"
      "(config)#": "#"
      "#": "exit"
    context_search:
      "interface": "(config-if)#"
      "configure terminal": "(config)#"
      "base": "#"
    end_context: "#"
  eos:
    vendor: "arista"
    hostname: "cisshgo-eos"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show version": "arista/eos/show_version.txt"
      "show ip interface brief": "arista/eos/show_ip_interface_brief.txt"
      "show running-config": "arista/eos/show_running-config.txt"
      "terminal length 0": "generic_empty_return.txt"
    context_hierarchy:
      "(config-if)#": "(config)#"
      "(config)#": "#"
      "#": ">"
      ">": "exit"
    context_search:
      "interface": "(config-if)#"
      "configure terminal": "(config)#"
      "enable": "#"
      "base": ">"
    end_context: "#"
  junos:
    vendor: "juniper"
    hostname: "cisshgo-junos"
    username: "admin"
    password: "admin"
    prompt_format: "{username}@{hostname}{context}"
    command_transcripts:
      "show version": "juniper/junos/show_version.txt"
      "show interfaces": "juniper/junos/show_interfaces.txt"
      "set cli screen-length 0": "generic_empty_return.txt"
    context_hierarchy:
      "#": ">"
      ">": "exit"
    context_search:
      "configure": "#"
      "base": ">"
    context_prefix_lines:
      "#": "[edit]"

scenarios:
  csr1000v-add-interface:
    platform: csr1000v
    sequence:
      - command: "enable"
        transcript: "generic_empty_return.txt"
      - command: "show running-config"
        transcript: "scenarios/csr1000v-add-interface/running_config_before.txt"
      - command: "configure terminal"
        transcript: "generic_empty_return.txt"
      - command: "interface GigabitEthernet0/0/2"
        transcript: "generic_empty_return.txt"
      - command: "ip address 172.16.0.1 255.255.255.0"
        transcript: "generic_empty_return.txt"
      - command: "description added-in-scenario"
        transcript: "generic_empty_return.txt"
      - command: "no shutdown"
        transcript: "generic_empty_return.txt"
      - command: "end"
        transcript: "generic_empty_return.txt"
      - command: "show running-config"
        transcript: "scenarios/csr1000v-add-interface/running_config_after.txt"

  # Ansible cisco.ios integration test scenarios
  ios-interfaces-merged:
    platform: ios
    sequence:
      # 1st facts gathering → "before" state (no descriptions on Gig2/Gig3)
      - command: "show running-config | section ^interface"
        transcript: "scenarios/ios-interfaces-merged/before.txt"
      # Config commands generated by ios_interfaces merged
      - command: "configure terminal"
        transcript: "generic_empty_return.txt"
      - command: "interface GigabitEthernet2"
        transcript: "generic_empty_return.txt"
      - command: "description Configured and Merged by Ansible-Network"
        transcript: "generic_empty_return.txt"
      - command: "interface GigabitEthernet3"
        transcript: "generic_empty_return.txt"
      - command: "description 04j"
        transcript: "generic_empty_return.txt"
      - command: "shutdown"
        transcript: "generic_empty_return.txt"
      - command: "end"
        transcript: "generic_empty_return.txt"
      # 2nd facts gathering → "after" state (descriptions applied, Gig3 shutdown)
      - command: "show running-config | section ^interface"
        transcript: "scenarios/ios-interfaces-merged/after.txt"
      # 3rd facts gathering → idempotent run (still "after" — no changes expected)
      - command: "show running-config | section ^interface"
        transcript: "scenarios/ios-interfaces-merged/after.txt"

  ios-interfaces-replaced:
    platform: ios
    sequence:
      # 1st facts gathering → "before" state
      - command: "show running-config | section ^interface"
        transcript: "scenarios/ios-interfaces-replaced/running_config_section_interface_before.txt"
      # Config commands sent by ios_interfaces (state: replaced)
      - command: "configure terminal"
        transcript: "generic_empty_return.txt"
      - command: "interface GigabitEthernet2"
        transcript: "generic_empty_return.txt"
      - command: "description Configured and Replaced by Ansible-Network"
        transcript: "generic_empty_return.txt"
      - command: "speed 1000"
        transcript: "generic_empty_return.txt"
      - command: "end"
        transcript: "generic_empty_return.txt"
      # 2nd facts gathering → "after" state
      - command: "show running-config | section ^interface"
        transcript: "scenarios/ios-interfaces-replaced/running_config_section_interface_after.txt"
